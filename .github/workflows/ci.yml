name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Flake check
        run: nix flake check

      - name: Build configs
        run: nix build .#configs

      - name: Build plugins
        run: nix build .#plugins

      # Miss_Pauling and tf2-server-wrapper can't be built yet
      # (uv2nix derivations not wired in). Uncomment when ready:
      # - name: Build miss-pauling
      #   run: nix build .#miss-pauling
      # - name: Build tf2-server-wrapper
      #   run: nix build .#tf2-server-wrapper
