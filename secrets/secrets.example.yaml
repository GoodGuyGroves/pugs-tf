# secrets.example.yaml
#
# Template showing the expected secret structure for pugs-tf.
# To create the real encrypted secrets file:
#
#   1. Copy this file:
#      cp secrets.example.yaml secrets.yaml
#
#   2. Fill in real values in secrets.yaml
#
#   3. Encrypt with sops:
#      sops -e -i secrets.yaml
#
# The encrypted secrets.yaml is safe to commit to git.

# Miss_Pauling secrets
discord_client_secret: "your-discord-client-secret"
discord_token: "your-discord-bot-token"
steam_api_key: "your-steam-api-key"
api_secret_key: "your-api-secret-key-for-token-signing"

# TF2 server secrets
pugA_rcon_password: "your-pugA-rcon-password"
pugB_rcon_password: "your-pugB-rcon-password"
sv_password: ""

# Plugin API keys
demostf_api_key: "your-demostf-api-key"
logstf_api_key: "your-logstf-api-key"
