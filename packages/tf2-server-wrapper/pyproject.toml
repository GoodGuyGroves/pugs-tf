[project]
name = "tf2-server-wrapper"
version = "0.1.0"
description = "TF2 dedicated server wrapper with management API and Miss_Pauling integration"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.118.0",
    "uvicorn>=0.30.0",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tf2_server_wrapper"]
